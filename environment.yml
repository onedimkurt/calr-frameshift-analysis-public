name: calr_env
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core Python
  - python=3.10.14
  
  # Scientific computing - NumPy pinned below 2.0 for compatibility
  - numpy=1.26.4
  - scipy=1.13.1
  - pandas=2.2.2
  
  # Visualization - publication quality
  - matplotlib=3.9.2
  - seaborn=0.13.2
  
  # Machine learning and embeddings
  - scikit-learn=1.5.1
  - umap-learn=0.5.6
  - hdbscan=0.8.38
  
  # Network analysis
  - networkx=3.3
  - python-louvain=0.16
  
  # Bioinformatics
  - biopython=1.84
  
  # HTTP and web scraping
  - requests=2.32.3
  - beautifulsoup4=4.12.3
  - lxml=5.3.0
  
  # Data handling
  - h5py=3.11.0
  - tqdm=4.66.5
  
  # Jupyter for interactive work
  - jupyterlab=4.2.4
  - ipykernel=6.29.5
  
  # Statistics
  - statsmodels=0.14.2
  
  # Pip packages not available in conda
  - pip=24.2
  - pip:
    # ESM models - pinned for compatibility
    - fair-esm==2.0.0
    - transformers==4.44.2
    
    # PyTorch for Apple Silicon (MPS)
    - torch==2.4.1
    
    # Structure prediction
    - esm-fold==1.0.3
    
    # Protein annotation tools
    - iupred3==1.0.0
    
    # iFeature for sequence descriptors
    - iFeature==1.0.0
    
    # API clients
    - httpx==0.27.2
    - aiohttp==3.10.5

# Environment variables
variables:
  PYTORCH_ENABLE_MPS_FALLBACK: "1"
